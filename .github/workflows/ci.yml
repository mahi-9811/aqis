name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/python_api/requirements.txt pytest flake8 black
      - name: Run backend tests
        env:
          ENV: TEST
        run: pytest -q
      - name: Lint backend
        run: |
          flake8 aqis services
          black --check aqis services
      - name: Validate OpenAPI schema
        env:
          ENV: TEST
        run: python -c "from services.python_api.app.main import app; import json; print(json.dumps(app.openapi())[:200])"
      - name: Build backend docker image
        run: docker build -f services/python_api/Dockerfile -t aqis-backend:ci .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package.json
      - name: Install UI dependencies
        run: npm install --prefix apps/web
      - name: Run UI tests
        run: npm run test --prefix apps/web
      - name: Lint UI
        run: npm run lint --prefix apps/web
      - name: Build UI production bundle
        run: npm run build --prefix apps/web
      - name: Build UI docker image
        run: docker build -f apps/web/Dockerfile -t aqis-web:ci .

  java-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run gateway tests
        run: mvn -f services/java-gateway/pom.xml test
      - name: Build gateway docker image
        run: docker build -f services/java-gateway/Dockerfile -t aqis-java-gateway:ci .
